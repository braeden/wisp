name: Release APK

# Builds a SIGNED release APK you can download on the phone and tap-to-install
# (no adb / USB debugging). Triggered manually or by pushing a v* tag.
#
# Required GitHub repository secrets (Settings -> Secrets and variables ->
# Actions). See RELEASE.md for how to generate them:
#   WISP_KEYSTORE_BASE64     base64 of your release keystore (.jks)
#   WISP_KEYSTORE_PASSWORD   keystore store password
#   WISP_KEY_ALIAS           key alias inside the keystore
#   WISP_KEY_PASSWORD        key password (often == store password)
#
# If the keystore secrets are absent the build still succeeds but the APK is
# DEBUG-signed (installable, but a different signing identity — see RELEASE.md).
# No ANTHROPIC_API_KEY is ever baked in; the distributed APK ships with an empty
# key and reads it at runtime from onboarding.

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write # needed to create a GitHub Release on tag builds

jobs:
  release-apk:
    name: Build signed release APK
    runs-on: ubuntu-latest
    env:
      # Job-level so the decode step's `if:` can gate on it (the secrets context
      # is not reliably available in step-level conditions). Masked in logs.
      WISP_KEYSTORE_BASE64: ${{ secrets.WISP_KEYSTORE_BASE64 }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      # Decode the base64 keystore secret to a file for the signing config. If
      # the secret is unset, the file is absent and the build falls back to
      # debug signing.
      - name: Decode release keystore
        if: ${{ env.WISP_KEYSTORE_BASE64 != '' }}
        run: |
          echo "$WISP_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/wisp-release.jks"
          echo "WISP_KEYSTORE_FILE=$RUNNER_TEMP/wisp-release.jks" >> "$GITHUB_ENV"

      - name: Resolve version name
        id: version
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(grep -m1 versionName app/build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/')"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # ANTHROPIC_API_KEY is intentionally NOT set here.
      - name: Build signed release APK
        env:
          WISP_KEYSTORE_PASSWORD: ${{ secrets.WISP_KEYSTORE_PASSWORD }}
          WISP_KEY_ALIAS: ${{ secrets.WISP_KEY_ALIAS }}
          WISP_KEY_PASSWORD: ${{ secrets.WISP_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Stage versioned APK
        id: apk
        run: |
          SRC="app/build/outputs/apk/release/app-release.apk"
          DEST="wisp-${{ steps.version.outputs.version }}.apk"
          cp "$SRC" "$DEST"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: wisp-release-apk
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error

      - name: Attach APK to GitHub Release (tag builds only)
        if: ${{ github.ref_type == 'tag' }}
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
          generate_release_notes: true
