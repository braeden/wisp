name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-check:
    name: Build, test & static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Installs cmdline-tools, accepts licenses, and exports ANDROID_HOME /
      # ANDROID_SDK_ROOT so AGP resolves the SDK without a committed
      # local.properties. AGP auto-provisions platforms;android-35 +
      # build-tools;35.0.0 on first use.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      # No ANTHROPIC_API_KEY is passed: BuildConfig.ANTHROPIC_API_KEY resolves to
      # "" and the instrumented smoke test (not run here) would skip cleanly.
      - name: Build, unit test, lint, detekt, ktlint
        run: ./gradlew assembleDebug testDebugUnitTest lintDebug detekt ktlintCheck --stacktrace

      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: reports
          path: app/build/reports/**
          if-no-files-found: ignore
